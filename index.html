<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lyneo ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1565C0;--blue-light:#E3F2FD;--blue-mid:#1976D2;
  --navy:#0D2137;--green:#2E7D32;--green-light:#E8F5E9;
  --orange:#E65100;--orange-light:#FFF3E0;
  --red:#C62828;--red-light:#FFEBEE;
  --gray-1:#F8FAFB;--gray-2:#F1F4F7;--gray-3:#E2E8EF;
  --gray-4:#B0BEC5;--gray-5:#78909C;--gray-6:#455A64;--gray-7:#263238;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.10);--shadow-md:0 4px 12px rgba(0,0,0,.12);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-1);color:var(--gray-7);font-size:14px;line-height:1.5}
.hidden{display:none!important}
/* SIDEBAR */
.sidebar{width:220px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-text{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(21,101,192,.35);color:#fff;border-left-color:var(--blue-mid)}
.nav-item i{font-size:17px;width:20px;text-align:center}
.sidebar-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.5)}
.sidebar-user strong{display:block;color:rgba(255,255,255,.85);font-size:13px;margin-bottom:2px}
/* LAYOUT */
.app-layout{display:flex;min-height:100vh}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--gray-3);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600}
.page{padding:24px;flex:1}
/* CARDS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-3);box-shadow:var(--shadow);margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--gray-3);display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:15px;font-weight:600}
.card-body{padding:20px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-3);padding:16px 18px;cursor:pointer;transition:box-shadow .15s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-label{font-size:11px;color:var(--gray-5);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;line-height:1}
.stat-sub{font-size:12px;color:var(--gray-5);margin-top:4px}
.stat-blue .stat-value{color:var(--blue)}
.stat-orange .stat-value{color:var(--orange)}
.stat-red .stat-value{color:var(--red)}
.stat-green .stat-value{color:var(--green)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid transparent;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;line-height:1.3;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-mid)}
.btn-secondary{background:#fff;color:var(--gray-7);border-color:var(--gray-3)}
.btn-secondary:hover{background:var(--gray-2)}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#FFCDD2}
.btn-success{background:var(--green-light);color:var(--green);border-color:#C8E6C9}
.btn-warning{background:var(--orange-light);color:var(--orange);border-color:#FFE0B2}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-brouillon{background:#F3E5F5;color:#7B1FA2}
.badge-envoyee{background:#E3F2FD;color:#1565C0}
.badge-rec_partielle{background:#FFF3E0;color:#E65100}
.badge-rec_totale{background:#E8F5E9;color:#2E7D32}
.badge-facturee{background:#E8EAF6;color:#283593}
.badge-payee{background:#E8F5E9;color:#1B5E20}
.badge-annulee{background:#FFEBEE;color:#C62828}
.badge-actif{background:#E8F5E9;color:#2E7D32}
.badge-pause{background:#FFF3E0;color:#E65100}
.badge-termine{background:var(--gray-2);color:var(--gray-6)}
.badge-recue{background:#E3F2FD;color:#1565C0}
.badge-validee{background:#E8F5E9;color:#2E7D32}
.badge-litige{background:#FFEBEE;color:#C62828}
.badge-oui{background:#E8F5E9;color:#2E7D32}
.badge-non{background:#FFEBEE;color:#C62828}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--gray-5);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--gray-3);white-space:nowrap;background:var(--gray-1)}
td{padding:11px 14px;border-bottom:1px solid var(--gray-2);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-1)}
.td-actions{display:flex;gap:6px;align-items:center}
/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label.field-label{font-size:12px;font-weight:600;color:var(--gray-6);text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{padding:8px 12px;border:1px solid var(--gray-3);border-radius:var(--radius);font-size:13px;color:var(--gray-7);background:#fff;transition:border .15s;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.1)}
textarea{resize:vertical;min-height:80px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-lg{max-width:960px}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--gray-3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:20px}
.modal-close{background:none;border:none;cursor:pointer;color:var(--gray-5);padding:4px;border-radius:4px;display:flex;font-size:20px}
.modal-close:hover{color:var(--gray-7);background:var(--gray-2)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-3)}
/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.page-header h1{font-size:20px;font-weight:700}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* SEARCH */
.search-wrap{position:relative}
.search-wrap input{padding-left:32px;min-width:220px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-4);font-size:15px;pointer-events:none}
/* ALERT */
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.alert-info{background:var(--blue-light);color:#0D47A1;border:1px solid #BBDEFB}
.alert-warning{background:var(--orange-light);color:#BF360C;border:1px solid #FFCC80}
/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--gray-4)}
.empty i{font-size:48px;margin-bottom:12px;display:block}
.empty p{font-size:14px;margin-bottom:16px}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.login-card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow-md)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .big-logo{font-size:36px;font-weight:800;color:var(--navy);letter-spacing:-2px}
.login-logo p{color:var(--gray-5);font-size:13px;margin-top:6px}
/* LIGNES PO */
.lignes-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
.lignes-table th{background:var(--gray-1);padding:8px 8px;font-size:11px;font-weight:600;color:var(--gray-5);text-transform:uppercase;border-bottom:1px solid var(--gray-3);text-align:left}
.lignes-table td{padding:5px 6px;border-bottom:1px solid var(--gray-2);vertical-align:middle}
.lignes-table input,.lignes-table select{padding:5px 7px;font-size:13px}
/* TOTAUX */
.totaux{display:flex;justify-content:flex-end;margin-top:12px}
.totaux-box{background:var(--gray-1);border:1px solid var(--gray-3);border-radius:var(--radius);padding:14px 20px;min-width:260px}
.totaux-row{display:flex;justify-content:space-between;gap:24px;padding:3px 0;font-size:13px}
.totaux-row.ttc{border-top:2px solid var(--gray-3);margin-top:8px;padding-top:8px;font-weight:700;font-size:16px;color:var(--blue)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;color:#fff;padding:12px 20px;border-radius:var(--radius);box-shadow:var(--shadow-md);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;max-width:360px;animation:slideIn .2s ease}
.toast-success{background:var(--green)}
.toast-error{background:var(--red)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* PO DETAIL INFO */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.info-item label{font-size:11px;font-weight:600;color:var(--gray-5);text-transform:uppercase;display:block;margin-bottom:2px}
.info-item span{font-size:14px}
.flex{display:flex}.gap-8{gap:8px}.items-center{align-items:center}
.text-blue{color:var(--blue)}.fw-600{font-weight:600}.text-muted{color:var(--gray-5)}.text-sm{font-size:12px}
.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}
.section-title{font-size:13px;font-weight:600;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>

<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="big-logo">LYNEO</div>
      <p>ERP — Espace de gestion<br><small style="color:#aaa">Luxembourg</small></p>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="field-label">Adresse email</label>
      <input type="email" id="login-email" placeholder="votre@email.com" value="admin@lyneo.lu"/>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="field-label">Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••" value="lyneo2026"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">
      <i class="ti ti-login"></i> Se connecter
    </button>
    <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--gray-4)">Mot de passe par défaut : lyneo2026</p>
    <div id="login-error" class="alert alert-warning hidden" style="margin-top:12px"></div>
  </div>
</div>

<div id="app-layout" class="app-layout hidden">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">LYNEO</div>
      <div class="logo-sub">ERP v1.0 — Luxembourg</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"><i class="ti ti-dashboard"></i> Tableau de bord</div>
      <div class="nav-section">Achats</div>
      <div class="nav-item" onclick="navigate('pos')" id="nav-pos"><i class="ti ti-shopping-cart"></i> Bons de commande</div>
      <div class="nav-item" onclick="navigate('receptions')" id="nav-receptions"><i class="ti ti-truck-delivery"></i> Réceptions (BL)</div>
      <div class="nav-item" onclick="navigate('factures')" id="nav-factures"><i class="ti ti-file-invoice"></i> Factures</div>
      <div class="nav-section">Référentiels</div>
      <div class="nav-item" onclick="navigate('chantiers')" id="nav-chantiers"><i class="ti ti-building-factory-2"></i> Chantiers</div>
      <div class="nav-item" onclick="navigate('fournisseurs')" id="nav-fournisseurs"><i class="ti ti-users"></i> Fournisseurs</div>
      <div id="nav-admin-section" class="hidden">
        <div class="nav-section">Administration</div>
        <div class="nav-item" onclick="navigate('utilisateurs')" id="nav-utilisateurs"><i class="ti ti-user-cog"></i> Utilisateurs</div>
      </div>
    </nav>
    <div class="sidebar-user">
      <strong id="sidebar-username">—</strong>
      <span id="sidebar-role">—</span>
      <div style="margin-top:8px">
        <button class="btn btn-secondary btn-sm" onclick="doLogout()"><i class="ti ti-logout"></i> Déconnexion</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Tableau de bord</div>
      <div style="font-size:12px;color:var(--gray-5)"><i class="ti ti-map-pin" style="font-size:13px;margin-right:4px"></i>Luxembourg</div>
    </div>
    <div class="page" id="page-content"></div>
  </div>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ── CONFIG SUPABASE ──────────────────────────────────────────
const SUPA_URL = 'https://ognucvqfatdhkyvrdhha.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbnVjdnFmYXRkaGt5dnJkaGhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjUxOTIsImV4cCI6MjA5ODI0MTE5Mn0.eeAUCXqTafM0Sfjocz7TTup9RdT12CJ_bSKZaiOlfGg';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── ÉTAT GLOBAL ──────────────────────────────────────────────
let currentUser = null;
let currentPage = 'dashboard';

// ── UTILS ────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('fr-LU',{style:'currency',currency:'EUR'}).format(n||0);
const fmtDate = d => d ? new Date(d).toLocaleDateString('fr-FR') : '—';
const today = () => new Date().toISOString().split('T')[0];
const el = id => document.getElementById(id);
const qs = sel => document.querySelector(sel);

function badge(statut, map) {
  const s = map[statut] || {label:statut,cls:''};
  return `<span class="badge badge-${statut}">${s.label}</span>`;
}

const STATUT_PO = {
  brouillon:'Brouillon', envoyee:'Envoyée', rec_partielle:'Réc. partielle',
  rec_totale:'Réc. totale', facturee:'Facturée', payee:'Payée', annulee:'Annulée'
};
const STATUT_CH = {actif:'Actif', pause:'En pause', termine:'Terminé'};
const STATUT_FA = {recue:'Reçue', validee:'Validée', payee:'Payée', litige:'Litige'};

function bPO(s){ return `<span class="badge badge-${s}">${STATUT_PO[s]||s}</span>`; }
function bCH(s){ return `<span class="badge badge-${s}">${STATUT_CH[s]||s}</span>`; }
function bFA(s){ return `<span class="badge badge-${s}">${STATUT_FA[s]||s}</span>`; }

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="ti ti-${type==='error'?'alert-circle':'circle-check'}"></i>${msg}`;
  el('toast-container').appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function showModal(html) {
  el('modal-container').innerHTML = html;
  el('modal-container').querySelector('.modal-overlay').addEventListener('click', function(e){
    if(e.target === this) closeModal();
  });
}
function closeModal(){ el('modal-container').innerHTML = ''; }

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  const email = el('login-email').value.trim();
  const pass = el('login-password').value;
  if(!email||!pass){ showLoginError('Remplissez tous les champs'); return; }
  const {data,error} = await sb.from('utilisateurs').select('*').eq('email',email).eq('actif',true).single();
  if(error||!data){ showLoginError('Email introuvable ou compte inactif'); return; }
  if(pass !== 'lyneo2026'){ showLoginError('Mot de passe incorrect'); return; }
  currentUser = data;
  sessionStorage.setItem('lyneo_user', JSON.stringify(data));
  initApp();
}

function showLoginError(msg){
  const e = el('login-error');
  e.classList.remove('hidden');
  e.textContent = msg;
}

function doLogout(){
  sessionStorage.removeItem('lyneo_user');
  currentUser = null;
  el('login-page').classList.remove('hidden');
  el('app-layout').classList.add('hidden');
}

function initApp(){
  el('login-page').classList.add('hidden');
  el('app-layout').classList.remove('hidden');
  el('sidebar-username').textContent = currentUser.prenom+' '+currentUser.nom;
  el('sidebar-role').textContent = {admin:'Administrateur',acheteur:'Acheteur',reception:'Réception',comptabilite:'Comptabilité'}[currentUser.role]||currentUser.role;
  if(currentUser.role==='admin') el('nav-admin-section').classList.remove('hidden');
  navigate('dashboard');
}

// ── NAVIGATION ───────────────────────────────────────────────
const PAGE_TITLES = {dashboard:'Tableau de bord',chantiers:'Chantiers',fournisseurs:'Fournisseurs',pos:'Bons de commande',receptions:'Réceptions',factures:'Factures',utilisateurs:'Utilisateurs'};

function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav = el('nav-'+page);
  if(nav) nav.classList.add('active');
  el('topbar-title').textContent = PAGE_TITLES[page]||'';
  const pages = {dashboard:renderDashboard,chantiers:renderChantiers,fournisseurs:renderFournisseurs,pos:renderPOS,receptions:renderReceptions,factures:renderFactures,utilisateurs:renderUtilisateurs};
  if(pages[page]) pages[page]();
}

// ── DASHBOARD ────────────────────────────────────────────────
async function renderDashboard(){
  el('page-content').innerHTML = '<div style="color:var(--gray-5);padding:40px;text-align:center"><i class="ti ti-loader" style="font-size:32px"></i><p style="margin-top:8px">Chargement...</p></div>';
  const [pos, bls, facs, chants, recentPos] = await Promise.all([
    sb.from('purchase_orders').select('id,statut,total_ttc'),
    sb.from('bons_livraison').select('id,statut_reception'),
    sb.from('factures').select('id,statut,montant_ttc'),
    sb.from('chantiers').select('id,statut'),
    sb.from('purchase_orders').select('id,numero,statut,total_ttc,date_creation,chantiers(nom),fournisseurs(nom)').order('created_at',{ascending:false}).limit(8)
  ]);
  const posD = pos.data||[], facsD = facs.data||[];
  const posEnCours = posD.filter(p=>!['payee','annulee'].includes(p.statut)).length;
  const blsAttente = (bls.data||[]).filter(b=>b.statut_reception==='partiel').length;
  const facsPayer = facsD.filter(f=>['recue','validee'].includes(f.statut)).length;
  const chantiersActifs = (chants.data||[]).filter(c=>c.statut==='actif').length;
  const montantEnCours = posD.filter(p=>['envoyee','rec_partielle','rec_totale'].includes(p.statut)).reduce((a,b)=>a+(b.total_ttc||0),0);
  const montantFacs = facsD.filter(f=>f.statut==='validee').reduce((a,b)=>a+(b.montant_ttc||0),0);
  const recs = recentPos.data||[];

  el('page-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card stat-blue" onclick="navigate('pos')">
        <div class="stat-label"><i class="ti ti-shopping-cart"></i> Commandes en cours</div>
        <div class="stat-value">${posEnCours}</div>
        <div class="stat-sub">${fmt(montantEnCours)} engagés</div>
      </div>
      <div class="stat-card stat-orange" onclick="navigate('receptions')">
        <div class="stat-label"><i class="ti ti-truck-delivery"></i> BL en attente</div>
        <div class="stat-value">${blsAttente}</div>

async function openChantierDetail(chantierId, tab){
  tab = tab || 'info';
  const chantier = _chantiers.find(c=>c.id===chantierId);
  if(!chantier) return;
  const [annexesR, posR] = await Promise.all([
    sb.from('anexos_chantier').select('*,utilisateurs(nom,prenom)').eq('chantier_id',chantierId).order('created_at',{ascending:false}),
    sb.from('purchase_orders').select('numero,statut,total_ttc,fournisseurs(nom)').eq('chantier_id',chantierId).order('created_at',{ascending:false})
  ]);
  const docs = annexesR.data||[];
  const pos = posR.data||[];

  const CATEGORIES = {plan:'📐 Plan',contrat:'📄 Contrat',photo:'📸 Photo',permis:'🏛️ Permis',devis:'📊 Devis',rapport:'📋 Rapport',autre:'📎 Autre'};
  const iconeType = (tipo) => {
    if(!tipo) return 'ti-file';
    if(tipo.includes('pdf')) return 'ti-file-type-pdf';
    if(tipo.includes('image')) return 'ti-photo';
    if(tipo.includes('word')||tipo.includes('document')) return 'ti-file-type-doc';
    if(tipo.includes('excel')||tipo.includes('sheet')) return 'ti-file-type-xls';
    return 'ti-file';
  };
  const fmtSize = (b) => {
    if(!b) return '';
    if(b<1024) return b+'B';
    if(b<1048576) return (b/1024).toFixed(1)+'KB';
    return (b/1048576).toFixed(1)+'MB';
  };
  const cats = ['plan','contrat','photo','permis','devis','rapport','autre'];
  const docsParCat = {};
  cats.forEach(c=>{ docsParCat[c] = docs.filter(d=>d.categorie===c); });
  const totalCmds = pos.reduce((a,p)=>a+(p.total_ttc||0),0);

  const tabs = [

    {id:'heures', label:'Heures', icon:'ti-clock'},

          ${docsParCat[c].map(d=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--gray-3);border-radius:var(--radius);margin-bottom:6px;background:#fff">

async function saveCodePointages(chantierId){
  const code = el('ch-code-pt').value.trim();
  await sb.from('chantiers').update({code_pointages:code}).eq('id',chantierId);
  // Mettre à jour localement
  const ch = _chantiers.find(c=>c.id===chantierId);
  if(ch) ch.code_pointages = code;
  showToast('Liaison pointages enregistrée');
  if(code) loadHeuresChantier({id:chantierId, code_pointages:code});
}

async function loadHeuresChantier(chantier){
  const container = el('heures-content');
  if(!container) return;

  if(!chantier.code_pointages){
    container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray-4)">
      <i class="ti ti-link-off" style="font-size:36px;display:block;margin-bottom:12px"></i>
      <p style="margin-bottom:12px">Ce chantier n'est pas encore lié au système de pointages.</p>
      <p style="font-size:12px">Allez dans l'onglet <strong>Informations</strong> et entrez le code chantier.</p>
    </div>`;
    return;
  }

  // Chercher le chantier dans la base pointages par code
  const {data:ptChantiers} = await sbPT.from('chantiers').select('*');
  const ptChantier = (ptChantiers||[]).find(c=>
    c.code === chantier.code_pointages ||
    c.nom?.toLowerCase() === chantier.code_pointages?.toLowerCase()
  );

  if(!ptChantier){
    container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray-4)">
      <i class="ti ti-alert-circle" style="font-size:36px;display:block;margin-bottom:12px;color:var(--orange)"></i>
      <p>Code "<strong>${chantier.code_pointages}</strong>" introuvable dans le système de pointages.</p>
      <p style="font-size:12px;margin-top:8px">Vérifiez le code dans l'onglet Informations.</p>
    </div>`;
    return;
  }

  // Récupérer les picages pour ce chantier
  const {data:picages} = await sbPT.from('picages')
    .select('*,employes(nom)')
    .eq('chantier_id', ptChantier.id)
    .order('date', {ascending:false});

  const pics = picages||[];
  if(pics.length===0){
    container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray-4)">
      <i class="ti ti-clock" style="font-size:36px;display:block;margin-bottom:12px"></i>
      <p>Aucune heure enregistrée pour ce chantier.</p>
    </div>`;
    return;
  }

  // Calculer totaux par employé
  const parEmploye = {};
  pics.forEach(p=>{
    const nom = p.employes?.nom || 'Inconnu';
    if(!parEmploye[nom]) parEmploye[nom] = {heures:0, jours:new Set()};
    parEmploye[nom].heures += parseFloat(p.heures)||0;
    parEmploye[nom].jours.add(p.date);
  });

  const totalHeures = pics.reduce((a,p)=>a+(parseFloat(p.heures)||0),0);
  const totalJours = new Set(pics.map(p=>p.date)).size;

  // Dernières 10 entrées
  const dernieres = pics.slice(0,10);

  container.innerHTML = `
    <!-- STATS HEURES -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div style="background:var(--blue-light);border-radius:var(--radius);padding:16px;text-align:center">
        <div style="font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;margin-bottom:4px">Total heures</div>
        <div style="font-size:28px;font-weight:700;color:var(--blue)">${totalHeures.toFixed(1)}h</div>
      </div>
      <div style="background:var(--green-light);border-radius:var(--radius);padding:16px;text-align:center">
        <div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;margin-bottom:4px">Jours travaillés</div>
        <div style="font-size:28px;font-weight:700;color:var(--green)">${totalJours}</div>
      </div>
      <div style="background:var(--orange-light);border-radius:var(--radius);padding:16px;text-align:center">
        <div style="font-size:11px;font-weight:600;color:var(--orange);text-transform:uppercase;margin-bottom:4px">Employés actifs</div>
        <div style="font-size:28px;font-weight:700;color:var(--orange)">${Object.keys(parEmploye).length}</div>
      </div>
    </div>

    <!-- PAR EMPLOYÉ -->
    <div style="font-size:12px;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Heures par employé</div>
    <div style="margin-bottom:20px">
      ${Object.entries(parEmploye).sort((a,b)=>b[1].heures-a[1].heures).map(([nom,d])=>{
        const pct = Math.round((d.heures/totalHeures)*100);
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500">${nom}</span>
            <span style="font-size:13px;font-weight:700;color:var(--blue)">${d.heures.toFixed(1)}h</span>
          </div>
          <div style="background:var(--gray-2);border-radius:4px;height:8px;overflow:hidden">
            <div style="background:var(--blue);height:100%;width:${pct}%;border-radius:4px;transition:width .5s"></div>
          </div>
          <div style="font-size:11px;color:var(--gray-5);margin-top:2px">${d.jours.size} jour(s) — ${pct}% du total</div>
        </div>`;
      }).join('')}
    </div>

    <!-- DERNIÈRES ENTRÉES -->
    <div style="font-size:12px;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">10 dernières entrées</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--gray-5);background:var(--gray-1);border-bottom:1px solid var(--gray-3)">Date</th>
        <th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--gray-5);background:var(--gray-1);border-bottom:1px solid var(--gray-3)">Employé</th>
        <th style="padding:8px 10px;text-align:right;font-size:11px;font-weight:600;color:var(--gray-5);background:var(--gray-1);border-bottom:1px solid var(--gray-3)">Heures</th>
      </tr></thead>
      <tbody>
        ${dernieres.map(p=>`<tr>
          <td style="padding:8px 10px;border-bottom:1px solid var(--gray-2)">${fmtDate(p.date)}</td>
          <td style="padding:8px 10px;border-bottom:1px solid var(--gray-2)">${p.employes?.nom||'—'}</td>
          <td style="padding:8px 10px;border-bottom:1px solid var(--gray-2);text-align:right;font-weight:600;color:var(--blue)">${parseFloat(p.heures).toFixed(1)}h</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function handleDropChantier(event, chantierId){
  event.preventDefault();
  event.currentTarget.style.borderColor='var(--gray-3)';
  event.currentTarget.style.background='var(--gray-1)';
  const cat = el('ch-upload-cat')?.value||'autre';
  await uploadAnnexesChantier(event.dataTransfer.files, chantierId, cat);
}

async function uploadAnnexesChantier(files, chantierId, categorie='autre'){
  if(!files||files.length===0) return;
  const progress = el('ch-upload-progress');
  const bar = el('ch-progress-bar');
  const txt = el('ch-progress-text');
  if(progress) progress.style.display='block';

  for(let i=0; i<files.length; i++){
    const file = files[i];
    if(file.size > 10*1024*1024){ showToast(`${file.name} dépasse 10MB — ignoré`,'error'); continue; }
    if(bar) bar.style.width=Math.round((i/files.length)*100)+'%';
    if(txt) txt.textContent=`Envoi ${i+1}/${files.length} : ${file.name}`;
    const path = `chantiers/${chantierId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const {data:upData, error:upErr} = await sb.storage.from('Documents').upload(path, file, {upsert:false});
    if(upErr){ showToast('Erreur: '+upErr.message,'error'); continue; }
    const {data:urlData} = sb.storage.from('Documents').getPublicUrl(path);
    await sb.from('anexos_chantier').insert({
      chantier_id:chantierId, nome_ficheiro:file.name, url:urlData.publicUrl,
      tamanho:file.size, tipo:file.type, categorie, carregado_por:currentUser.id
    });
  }
  if(bar) bar.style.width='100%';
  if(txt) txt.textContent='Terminé !';
  showToast(files.length>1?`${files.length} documents ajoutés`:'Document ajouté');
  setTimeout(()=>openChantierDetail(chantierId), 500);
}

async function deleteAnnexeChantier(id, chantierId, url){
  if(!confirm('Supprimer ce document ?')) return;
  const path = url.split('/Documents/')[1];
  if(path) await sb.storage.from('Documents').remove([path]);
  await sb.from('anexos_chantier').delete().eq('id',id);
  showToast('Document supprimé');
  openChantierDetail(chantierId);
}

async function loadLignesBL(poId){
  if(!poId){ el('bl-lignes-section').innerHTML=''; return; }
  const {data} = await sb.from('lignes_po').select('*').eq('po_id',poId).order('ordre');
  _lignesRec = data||[];
  el('bl-lignes-section').innerHTML = `
    <strong style="font-size:13px;display:block;margin-bottom:8px">Quantités reçues</strong>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--gray-5);background:var(--gray-1);border-bottom:1px solid var(--gray-3)">Description</th>
        <th style="padding:7px 10px;text-align:right;font-size:11px;font-weight:600;color:var(--gray-5);background:var(--gray-1);border-bottom:1px solid var(--gray-3)">Qté commandée</th>
        <th style="padding:7px 10px;text-align:right;font-size:11px;font-weight:600;color:var(--gray-5);background:var(--gray-1);border-bottom:1px solid var(--gray-3)">Qté reçue</th>
      </tr></thead>
      <tbody>${_lignesRec.map(l=>`<tr>
        <td style="padding:8px 10px;border-bottom:1px solid var(--gray-2)">${l.description}</td>
        <td style="padding:8px 10px;border-bottom:1px solid var(--gray-2);text-align:right">${l.quantite} ${l.unite}</td>
        <td style="padding:8px 10px;border-bottom:1px solid var(--gray-2);text-align:right;width:120px">
          <input type="number" min="0" step="0.001" value="${l.quantite}" id="qty-${l.id}" style="width:90px;text-align:right;padding:5px 8px;border:1px solid var(--gray-3);border-radius:4px"/>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
}

async function saveBL(){
  const poId = el('bl-po').value;
  const num = el('bl-num').value.trim();
  if(!poId||!num){ showToast('Commande et N° BL obligatoires','error'); return; }
  const {data:bl,error} = await sb.from('bons_livraison').insert({
    po_id:poId, numero_bl:num, date_reception:el('bl-date').value,
    recu_par:currentUser.id, statut_reception:el('bl-statut').value,
    observations:el('bl-obs').value
  }).select().single();
  if(error){ showToast('Erreur: '+error.message,'error'); return; }
  const lignesInsert = _lignesRec.filter(l=>(parseFloat(el('qty-'+l.id)?.value)||0)>0).map(l=>({
    bl_id:bl.id, ligne_po_id:l.id, quantite_recue:parseFloat(el('qty-'+l.id).value)||0
  }));
  if(lignesInsert.length>0) await sb.from('lignes_bl').insert(lignesInsert);
  const newStatut = el('bl-statut').value==='complet'?'rec_totale':'rec_partielle';
  await sb.from('purchase_orders').update({statut:newStatut}).eq('id',poId);
  showToast('Bon de livraison enregistré');
  closeModal(); renderReceptions();
}

async function openFacDetail(facId){
  const {data:fac} = await sb.from('factures').select('*,purchase_orders(numero,fournisseurs(nom),chantiers(nom))').eq('id',facId).single();
  const {data:annexes} = await sb.from('anexos').select('*,utilisateurs(nom,prenom)').eq('factura_id',facId).order('created_at',{ascending:false});
  const docs = annexes||[];

  const iconeType = (tipo) => {
    if(!tipo) return 'ti-file';
    if(tipo.includes('pdf')) return 'ti-file-type-pdf';
    if(tipo.includes('image')) return 'ti-photo';
    if(tipo.includes('word')||tipo.includes('document')) return 'ti-file-type-doc';
    if(tipo.includes('excel')||tipo.includes('sheet')) return 'ti-file-type-xls';
    return 'ti-file';
  };

  const fmtSize = (b) => {
    if(!b) return '';
    if(b<1024) return b+'B';
    if(b<1048576) return (b/1024).toFixed(1)+'KB';
    return (b/1048576).toFixed(1)+'MB';
  };

  showModal(`<div class="modal-overlay"><div class="modal modal-lg">
    <div class="modal-header">
      <div>
        <h3>${fac.numero_facture_fournisseur}</h3>
        <span style="font-size:12px;color:var(--gray-5)">${fac.purchase_orders?.fournisseurs?.nom||''} — ${fac.purchase_orders?.chantiers?.nom||''}</span>
      </div>
      <div class="flex gap-8 items-center">
        ${fac.statut==='recue'?`<button class="btn btn-success btn-sm" onclick="validerFac('${fac.id}');closeModal()"><i class="ti ti-check"></i> Valider</button>`:''}
        ${fac.statut==='validee'?`<button class="btn btn-primary btn-sm" onclick="closeModal();openPayModal('${fac.id}','${fac.po_id}',${fac.montant_ttc})"><i class="ti ti-currency-euro"></i> Payer</button>`:''}
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="modal-body">

      <!-- INFOS FACTURE -->
      <div class="info-grid" style="margin-bottom:20px">
        <div class="info-item"><label>N° Commande</label><span>${fac.purchase_orders?.numero||'—'}</span></div>
        <div class="info-item"><label>Date facture</label><span>${fmtDate(fac.date_facture)}</span></div>
        <div class="info-item"><label>Échéance</label><span>${fmtDate(fac.date_echeance)}</span></div>
        <div class="info-item"><label>Montant HT</label><span>${fmt(fac.montant_ht)}</span></div>
        <div class="info-item"><label>TVA</label><span>${fmt(fac.montant_tva)}</span></div>
        <div class="info-item"><label>Total TTC</label><span style="font-weight:700;color:var(--blue);font-size:16px">${fmt(fac.montant_ttc)}</span></div>
      </div>
      ${fac.observations?`<div class="alert alert-info" style="margin-bottom:16px"><i class="ti ti-info-circle"></i>${fac.observations}</div>`:''}

      <!-- ZONE ANNEXES -->
      <div style="border:2px dashed var(--gray-3);border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center;background:var(--gray-1)" id="drop-zone"
        ondragover="event.preventDefault();this.style.borderColor='var(--blue)';this.style.background='var(--blue-light)'"
        ondragleave="this.style.borderColor='var(--gray-3)';this.style.background='var(--gray-1)'"
        ondrop="handleDrop(event,'${facId}')">

        <p style="color:var(--gray-5);margin-bottom:12px">Glissez vos documents ici ou</p>
        <label class="btn btn-secondary" style="cursor:pointer">
          <i class="ti ti-paperclip"></i> Choisir un fichier

        </label>

                <i class="ti ${iconeType(d.tipo)}" style="font-size:24px;color:var(--blue)"></i>
                <div>
                  <div style="font-weight:600;font-size:13px">${d.nome_ficheiro}</div>
                  <div style="font-size:11px;color:var(--gray-5)">${fmtSize(d.tamanho)} — Ajouté par ${d.utilisateurs?.prenom||''} ${d.utilisateurs?.nom||''} le ${fmtDate(d.created_at)}</div>
                </div>
              </div>
              <div class="flex gap-8">
                <a href="${d.url}" target="_blank" class="btn btn-secondary btn-sm"><i class="ti ti-eye"></i> Ouvrir</a>
                <a href="${d.url}" download="${d.nome_ficheiro}" class="btn btn-secondary btn-sm"><i class="ti ti-download"></i></a>
                <button class="btn btn-danger btn-sm" onclick="deleteAnnexe('${d.id}','${facId}','${d.url}')"><i class="ti ti-trash"></i></button>
              </div>
            </div>`).join('')}
      </div>

      <div id="upload-progress" style="display:none;margin-top:12px">
        <div style="background:var(--gray-2);border-radius:4px;height:6px;overflow:hidden">
          <div id="progress-bar" style="background:var(--blue);height:100%;width:0%;transition:width .3s"></div>
        </div>
        <p style="font-size:12px;color:var(--gray-5);margin-top:6px;text-align:center" id="progress-text">Téléchargement en cours...</p>
      </div>

    </div>
  </div></div>`);
}

async function handleDrop(event, facId){
  event.preventDefault();
  const zone = el('drop-zone');
  zone.style.borderColor='var(--gray-3)';
  zone.style.background='var(--gray-1)';
  const files = event.dataTransfer.files;
  if(files.length>0) await uploadAnnexes(files, facId);
}

async function uploadAnnexes(files, facId){
  if(!files||files.length===0) return;
  const progress = el('upload-progress');
  const bar = el('progress-bar');
  const txt = el('progress-text');
  if(progress) progress.style.display='block';

  for(let i=0; i<files.length; i++){
    const file = files[i];
    if(file.size > 10*1024*1024){ showToast(`${file.name} dépasse 10MB — ignoré`,'error'); continue; }
    const pct = Math.round((i/files.length)*100);
    if(bar) bar.style.width=pct+'%';
    if(txt) txt.textContent=`Envoi ${i+1}/${files.length} : ${file.name}`;

    const ext = file.name.split('.').pop();
    const path = `factures/${facId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const {data:upData, error:upErr} = await sb.storage.from('Documents').upload(path, file, {upsert:false});
    if(upErr){ showToast('Erreur upload: '+upErr.message,'error'); continue; }
    const {data:urlData} = sb.storage.from('Documents').getPublicUrl(path);
    await sb.from('anexos').insert({
      factura_id:facId, nome_ficheiro:file.name, url:urlData.publicUrl,
      tamanho:file.size, tipo:file.type, carregado_por:currentUser.id
    });
  }

  if(bar) bar.style.width='100%';
  if(txt) txt.textContent='Terminé !';
  showToast(files.length>1?`${files.length} documents ajoutés`:'Document ajouté');
  setTimeout(()=>openFacDetail(facId), 500);
}

async function deleteAnnexe(id, facId, url){
  if(!confirm('Supprimer ce document ?')) return;
  const path = url.split('/Documents/')[1];
  if(path) await sb.storage.from('Documents').remove([path]);
  await sb.from('anexos').delete().eq('id',id);
  showToast('Document supprimé');
  openFacDetail(facId);
}

function openFacModal(){
  const opts = _posPourFac.map(p=>`<option value="${p.id}">${p.numero} — ${p.fournisseurs?.nom}</option>`).join('');
  showModal(`<div class="modal-overlay"><div class="modal">
    <div class="modal-header"><h3>Saisir une facture fournisseur</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="field-label">Commande associée *</label><select id="fac-po"><option value="">— Sélectionner —</option>${opts}</select></div>
        <div class="form-group"><label class="field-label">N° Facture fournisseur *</label><input id="fac-num" placeholder="FA-2026-XXXX"/></div>
        <div class="form-group"><label class="field-label">Date de facture *</label><input type="date" id="fac-date" value="${today()}"/></div>
        <div class="form-group"><label class="field-label">Date d'échéance</label><input type="date" id="fac-echeance"/></div>
        <div class="form-group"><label class="field-label">Montant HT (€)</label><input type="number" step="0.01" id="fac-ht" value="0" oninput="calcFacTTC()"/></div>
        <div class="form-group"><label class="field-label">Montant TVA (€)</label><input type="number" step="0.01" id="fac-tva" value="0" oninput="calcFacTTC()"/></div>
        <div class="form-group"><label class="field-label">Montant TTC (€)</label><input type="number" step="0.01" id="fac-ttc" value="0" style="font-weight:700;color:var(--blue)"/></div>
        <div class="form-group full"><label class="field-label">Observations</label><textarea id="fac-obs" placeholder="Notes, réserves..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveFac()"><i class="ti ti-check"></i> Enregistrer</button>
      </div>
    </div>
  </div></div>`);
}

function calcFacTTC(){
  const ht = parseFloat(el('fac-ht').value)||0;
  const tva = parseFloat(el('fac-tva').value)||0;
  el('fac-ttc').value = (ht+tva).toFixed(2);
}

async function saveFac(){
  const po_id = el('fac-po').value;
  const num = el('fac-num').value.trim();
  const date = el('fac-date').value;
  if(!po_id||!num||!date){ showToast('Champs obligatoires manquants','error'); return; }
  const {data:fac} = await sb.from('factures').insert({po_id,numero_facture_fournisseur:num,date_facture:date,date_echeance:el('fac-echeance').value||null,montant_ht:parseFloat(el('fac-ht').value)||0,montant_tva:parseFloat(el('fac-tva').value)||0,montant_ttc:parseFloat(el('fac-ttc').value)||0,statut:'recue',saisie_par:currentUser.id,observations:el('fac-obs').value}).select().single();
  await sb.from('purchase_orders').update({statut:'facturee'}).eq('id',po_id);
  showToast('Facture enregistrée — vous pouvez maintenant y joindre des documents');
  closeModal();
  if(fac) openFacDetail(fac.id);
  else renderFactures();
}

async function validerFac(id){ await sb.from('factures').update({statut:'validee'}).eq('id',id); showToast('Facture validée'); renderFactures(); }
async function litigeFac(id){ await sb.from('factures').update({statut:'litige'}).eq('id',id); showToast('Facture mise en litige'); renderFactures(); }

function openPayModal(facId, poId, montant){
  showModal(`<div class="modal-overlay"><div class="modal">
    <div class="modal-header"><h3>Enregistrer le paiement</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="field-label">Date de paiement</label><input type="date" id="pay-date" value="${today()}"/></div>
        <div class="form-group"><label class="field-label">Montant payé (€)</label><input type="number" step="0.01" id="pay-montant" value="${montant}"/></div>
        <div class="form-group"><label class="field-label">Mode de paiement</label>
          <select id="pay-mode">
            <option value="virement">Virement bancaire</option>
            <option value="cheque">Chèque</option>
            <option value="carte">Carte</option>
          </select>
        </div>
        <div class="form-group"><label class="field-label">Référence virement</label><input id="pay-ref" placeholder="REF-XXXX"/></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="savePay('${facId}','${poId}')"><i class="ti ti-check"></i> Confirmer le paiement</button>
      </div>
    </div>
  </div></div>`);
}

async function savePay(facId, poId){
  await sb.from('paiements').insert({facture_id:facId,date_paiement:el('pay-date').value,montant:parseFloat(el('pay-montant').value),mode_paiement:el('pay-mode').value,reference_virement:el('pay-ref').value,effectue_par:currentUser.id});
  await sb.from('factures').update({statut:'payee'}).eq('id',facId);
  await sb.from('purchase_orders').update({statut:'payee'}).eq('id',poId);
  showToast('Paiement enregistré'); closeModal(); renderFactures();
}

// ── UTILISATEURS ─────────────────────────────────────────────
async function renderUtilisateurs(){
  const {data} = await sb.from('utilisateurs').select('*').order('nom');
  const users = data||[];
  const ROLES = {admin:'Administrateur',acheteur:'Acheteur',reception:'Réception',comptabilite:'Comptabilité'};
  el('page-content').innerHTML = `
    <div class="page-header">
      <h1>Utilisateurs</h1>
      <button class="btn btn-primary" onclick="openUserModal()"><i class="ti ti-plus"></i> Nouvel utilisateur</button>
    </div>
    <div class="alert alert-info" style="margin-bottom:16px"><i class="ti ti-info-circle"></i>Mot de passe par défaut pour tous les comptes : <strong>lyneo2026</strong></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Prénom</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Actif</th><th>Actions</th></tr></thead>
          <tbody>
            ${users.map(r=>`<tr>
              <td>${r.prenom}</td><td><strong>${r.nom}</strong></td><td>${r.email}</td>
              <td><span class="badge badge-envoyee">${ROLES[r.role]||r.role}</span></td>
              <td><span class="badge badge-${r.actif?'oui':'non'}">${r.actif?'Actif':'Inactif'}</span></td>
              <td><button class="btn btn-secondary btn-sm" onclick='openUserModal(${JSON.stringify(r).replace(/'/g,"\\'")})'><i class="ti ti-edit"></i></button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function openUserModal(r=null){
  showModal(`<div class="modal-overlay"><div class="modal">
    <div class="modal-header"><h3>${r?'Modifier utilisateur':'Nouvel utilisateur'}</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="field-label">Prénom *</label><input id="u-prenom" value="${r?.prenom||''}" placeholder="Prénom"/></div>
        <div class="form-group"><label class="field-label">Nom *</label><input id="u-nom" value="${r?.nom||''}" placeholder="Nom"/></div>
        <div class="form-group"><label class="field-label">Email *</label><input type="email" id="u-email" value="${r?.email||''}" placeholder="prenom.nom@lyneo.lu"/></div>
        <div class="form-group"><label class="field-label">Rôle</label>
          <select id="u-role">
            <option value="admin" ${r?.role==='admin'?'selected':''}>Administrateur</option>
            <option value="acheteur" ${r?.role==='acheteur'?'selected':''}>Acheteur</option>
            <option value="reception" ${r?.role==='reception'?'selected':''}>Réception</option>
            <option value="comptabilite" ${r?.role==='comptabilite'?'selected':''}>Comptabilité</option>
          </select>
        </div>
        <div class="form-group"><label class="field-label">Actif</label>
          <select id="u-actif">
            <option value="1" ${r?.actif!==false?'selected':''}>Oui</option>
            <option value="0" ${r?.actif===false?'selected':''}>Non</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveUser('${r?.id||''}')"><i class="ti ti-check"></i> Enregistrer</button>
      </div>
    </div>
  </div></div>`);
}

async function saveUser(id){
  const prenom=el('u-prenom').value.trim(), nom=el('u-nom').value.trim(), email=el('u-email').value.trim();
  if(!prenom||!nom||!email){ showToast('Champs obligatoires manquants','error'); return; }
  const data={prenom,nom,email,role:el('u-role').value,actif:el('u-actif').value==='1'};
  if(id) await sb.from('utilisateurs').update(data).eq('id',id);
  else await sb.from('utilisateurs').insert(data);
  showToast(id?'Utilisateur mis à jour':'Utilisateur créé');
  closeModal(); renderUtilisateurs();
}

window.addEventListener('load', ()=>{
  const stored = sessionStorage.getItem('lyneo_user');
  if(stored){ currentUser = JSON.parse(stored); initApp(); }
  el('login-password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
});
